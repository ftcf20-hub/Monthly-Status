<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTCF | Secure Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .bank-gradient { background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="pb-10">

    <!-- Header Section -->
    <div class="bank-gradient text-white p-8 rounded-b-[3rem] shadow-2xl mb-8">
        <h1 class="text-sm uppercase tracking-[0.2em] opacity-60 mb-1">Rs.500</h1>
        <h2 class="text-2xl font-bold">Monthly collection</h2>
        <div class="mt-6 flex justify-between items-center bg-white/10 p-4 rounded-2xl border border-white/10">
            <div>
                <p class="text-[10px] uppercase opacity-70">Current Period</p>
                <p id="month-display" class="font-semibold">Loading...</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] uppercase opacity-70">Total Fund</p>
                <p id="total-collection" class="font-bold text-lg text-emerald-400">Rs. 0</p>
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="px-6 mb-6">
        <input type="text" id="searchInput" placeholder="Search member..." 
               class="w-full p-4 rounded-2xl border-none shadow-sm focus:ring-2 focus:ring-blue-600 outline-none">
    </div>

    <!-- Members List -->
    <div class="px-6" id="member-list">
        <p class="text-center text-gray-400">Connecting to secure server...</p>
    </div>

    <script>
        const SHEET_ID = "1hUEigyVt9FcLdeT-2G44mcUMo-r3gSb7AN0XcXilMVw";
        const BASE_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        async function loadDashboardData() {
            try {
                // Fetch Month
                const monthRes = await fetch(`${BASE_URL}&range=H1`);
                const monthTxt = await monthRes.text();
                const monthJson = JSON.parse(monthTxt.substring(47).slice(0, -2));
                document.getElementById('month-display').innerText = monthJson.table.rows[0]?.c[0]?.v || "N/A";

                // Fetch Members
                const dataRes = await fetch(`${BASE_URL}&range=A2:E100`);
                const dataTxt = await dataRes.text();
                const dataJson = JSON.parse(dataTxt.substring(47).slice(0, -2));
                renderMembers(dataJson.table.rows);
            } catch (err) {
                document.getElementById('member-list').innerHTML = "<p class='text-center text-red-500'>Error: Sheet access denied.</p>";
            }
        }

        function renderMembers(rows) {
            const list = document.getElementById('member-list');
            list.innerHTML = '';
            let total = 0;

            rows.forEach(row => {
                if(!row.c[0]) return;
                const name = row.c[0].v;
                const amount = row.c[1]?.v || 0;
                const status = row.c[2]?.v || "UNPAID";
                if(status.toUpperCase() === 'PAID') total += amount;

                const card = document.createElement('div');
                card.className = "glass p-4 rounded-3xl shadow-sm mb-3 flex items-center justify-between border border-gray-100";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center font-bold text-slate-700">${name.charAt(0)}</div>
                        <div>
                            <h4 class="font-bold text-slate-800">${name}</h4>
                            <p class="text-[10px] text-slate-400 uppercase">Trust Member</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-slate-900">Rs. ${amount.toLocaleString()}</p>
                        <span class="text-[9px] px-2 py-0.5 rounded-lg font-bold ${status.toUpperCase() === 'PAID' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">${status}</span>
                    </div>
                `;
                list.appendChild(card);
            });
            document.getElementById('total-collection').innerText = `Rs. ${total.toLocaleString()}`;
        }

        loadDashboardData();

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('#member-list > div').forEach(card => {
                const name = card.querySelector('h4').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });
    </script>
</body>
</html>
